version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: lab_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: lab_db
      MYSQL_USER: lab_user
      MYSQL_PASSWORD: lab_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lab_net

  backend:
    build: ./backend
    container_name: lab_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=lab_user
      - DB_PASSWORD=lab_pass
      - DB_NAME=lab_db
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - lab_net

  frontend:
    image: nginx:alpine
    container_name: lab_web
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - lab_net

volumes:
  db_data:

networks:
  lab_net:
    driver: bridge